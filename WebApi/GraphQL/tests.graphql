mutation AddMovie {
    addMovie(
        input: {
            title: "Interstellar"
            imageUrl: "/images/interstellar.jpg"
            videoSource: "/videos/interstellar.mp4"
            trailerUrl: "https://youtu.be/zSWdZVtXT7E"
            published: true
            genreIds: [1]
            castAndCrew: [{
                name: "Alex Stamate"
                role: "Antagonist"
                stageName: "Alex Barnu"
            }]
        }
    ) {
        id
        title
        published
        genres {
            id
            name
        }
        castAndCrew{
            name
            role
            stageName
        }
    }
}

query GetMovies {
    movies(pagination:  {
         page: 0
         perPage: 2
      })
      {
        items{
          id
          title
          imageUrl
          videoSource
          trailerUrl
          published
          genres {
              id
              name
          }
        }
      }
}

query GetMovie {
    movie(id: 1) {
        id
        title
        imageUrl
        videoSource
        trailerUrl
        published
    }
}

query GetMovieWithGenres {
    movie(id: 1) {
        id
        title
        genres {
            id
            name
        }
    }
}

query GetGenres {
    genres {
        id
        name
    }
}

query GetGenre {
    genre(id: 1) {
        id
        name
    }
}

query GetCollections {
    collections(pagination:  {
       page: 0
       perPage: 3
    }) {
        items{
          id
          name
          published
             movies {
               id
               title
               imageUrl
          }

        }
    }
}

query GetCollection {
    collection(id: 1) {
        id
        name
        published
        movies {
            id
            title
            imageUrl
        }
    }
}


