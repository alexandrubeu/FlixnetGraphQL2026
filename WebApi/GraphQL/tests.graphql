########################################
# QUERIES
########################################

# Get all movies
query GetMovies {
    movies {
        id
        title
        imageUrl
        videoSource
        trailerUrl
        published
    }
}

# Get all movies with genres
query GetMoviesWithGenres {
    movies {
        id
        title
        genres {
            id
            name
        }
    }
}

# Get one movie
query GetMovie {
    movie(id: 1) {
        id
        title
        imageUrl
        videoSource
        trailerUrl
        published
    }
}

# Get one movie with genres
query GetMovieWithGenres {
    movie(id: 1) {
        id
        title
        genres {
            id
            name
        }
    }
}

# Get all genres
query GetGenres {
    genres {
        id
        name
    }
}

# Get one genre
query GetGenre {
    genre(id: 1) {
        id
        name
    }
}

# Get all collections
query GetCollections {
    collections {
        id
        name
        published
    }
}

# Get all collections with movies
query GetCollectionsWithMovies {
    collections {
        id
        name
        published
        movies {
            id
            title
            imageUrl
        }
    }
}

# Get one collection
query GetCollection {
    collection(id: 1) {
        id
        name
        published
        movies {
            id
            title
            imageUrl
        }
    }
}

########################################
# MUTATIONS - GENRES
########################################

mutation AddGenre {
    addGenre(
        input: {
            name: "Science Fiction"
        }
    ) {
        id
        name
    }
}

mutation UpdateGenre {
    updateGenre(
        id: 1
        input: {
            name: "Sci-Fi"
        }
    ) {
        id
        name
    }
}

mutation DeleteGenre {
    deleteGenre(id: 1)
}

########################################
# MUTATIONS - MOVIES
########################################

mutation AddMovie {
    addMovie(
        input: {
            title: "Interstellar"
            imageUrl: "/images/interstellar.jpg"
            videoSource: "/videos/interstellar.mp4"
            trailerUrl: "https://youtu.be/zSWdZVtXT7E"
            published: true
            genreIds: [1, 3]
            castAndCrew: []
        }
    ) {
        id
        title
        published
        genres {
            id
            name
        }
    }
}

mutation UpdateMovie {
    updateMovie(
        id: 1
        input: {
            title: "Interstellar (Remastered)"
            imageUrl: "/images/interstellar-new.jpg"
            videoSource: "/videos/interstellar.mp4"
            trailerUrl: "https://youtu.be/zSWdZVtXT7E"
            published: false
            genreIds: [2]
            castAndCrew: []
        }
    ) {
        id
        title
        published
        genres {
            id
            name
        }
    }
}

mutation DeleteMovie {
    deleteMovie(id: 1)
}

########################################
# MUTATIONS - COLLECTIONS
########################################

mutation AddCollection {
    addCollection(
        input: {
            name: "Top Picks"
            published: true
            movieIds: [1, 2]
        }
    ) {
        id
        name
        published
        movies {
            id
            title
        }
    }
}

mutation UpdateCollection {
    updateCollection(
        id: 1
        input: {
            name: "Summer Favorites"
            published: true
            movieIds: [2, 3]
        }
    ) {
        id
        name
        published
        movies {
            id
            title
        }
    }
}

mutation DeleteCollection {
    deleteCollection(id: 1)
}